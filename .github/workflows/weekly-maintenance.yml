name: Weekly maintenance check

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Content freshness report
        id: freshness
        run: npm run check:freshness | tee freshness.txt

      - name: External link check
        id: links
        continue-on-error: true
        run: npm run check:external-links | tee external-links.txt

      - name: Open or update a tracking issue if anything needs attention
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const freshness = fs.readFileSync('freshness.txt', 'utf8');
            const links = fs.readFileSync('external-links.txt', 'utf8');

            const hasStaleContent = freshness.includes('due for a review pass');
            const hasBrokenLinks = links.includes('broken external link');

            if (!hasStaleContent && !hasBrokenLinks) {
              console.log('Nothing needs attention this week.');
              return;
            }

            const title = 'Weekly maintenance report';
            const body = [
              '_Auto-generated by the weekly maintenance workflow._',
              '',
              '## Content freshness',
              '```',
              freshness.trim(),
              '```',
              '',
              '## External links',
              '```',
              links.trim(),
              '```',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'maintenance',
            });

            const open = existing.data.find(i => i.title === title);

            if (open) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['maintenance'],
              });
            }
