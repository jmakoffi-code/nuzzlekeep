name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check content data integrity
        run: npm run check:links

      - name: Build the site
        run: npm run build

      - name: Content freshness report
        run: npm run check:freshness
        continue-on-error: true
